# Cloud Build config so you can build the backend image WITHOUT a local Docker
# daemon (handy on Windows). Run from the repo root:
#
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_IMAGE="YOUR_REGION-docker.pkg.dev/PROJECT_ID/optcg/optcg-server" .
#
# The trailing "." is the source: Cloud Build uploads it (honoring
# .gcloudignore, which mirrors .dockerignore so the 2.5 GB of assets are NOT
# uploaded), then runs `docker build -f server/Dockerfile` with the repo root as
# context — exactly like the local build.
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'server/Dockerfile', '-t', '${_IMAGE}', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']
images:
  - '${_IMAGE}'
substitutions:
  _IMAGE: 'REGION-docker.pkg.dev/PROJECT_ID/optcg/optcg-server'
options:
  machineType: 'E2_HIGHCPU_8'
