<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#071126" />
    <title>One Piece TCG Online</title>
    <style>
      /* --- Native splash: renders before any JS bundle arrives ----------- */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #071126;
        background-image: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 14%);
      }

      #splash::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 38%, rgba(255,211,74,0.13) 0%, transparent 55%);
        pointer-events: none;
      }

      #splash::after {
        content: "";
        position: absolute;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        width: 10rem;
        height: 0.5rem;
        border-left: 2px solid rgba(217,164,65,0.35);
        border-right: 2px solid rgba(217,164,65,0.35);
        background: linear-gradient(90deg, transparent, rgba(217,164,65,0.85), transparent);
      }

      #splash-inner {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
      }

      #splash-logo-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      #splash-logo {
        width: min(82vw, 36rem);
        height: 4.7rem;
        background: linear-gradient(180deg, #ffe17a 0%, #d9a441 50%, #8e5b12 100%);
        -webkit-mask-image: url(/ui/logo_op.png);
        mask-image: url(/ui/logo_op.png);
        -webkit-mask-position: center;
        mask-position: center;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-size: contain;
        mask-size: contain;
        filter: drop-shadow(0 7px 0 rgba(0,0,0,0.65));
      }

      #splash-sub {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        font-size: 0.55rem;
        letter-spacing: 0.28em;
        color: rgba(217,164,65,0.8);
        text-transform: uppercase;
        filter: drop-shadow(0 2px 0 rgba(0,0,0,0.65));
      }

      /* Progress bar */
      #splash-progress-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.6rem;
        width: min(72vw, 22rem);
      }

      #splash-bar-track {
        width: 100%;
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px;
        overflow: hidden;
      }

      #splash-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #8e5b12, #d9a441, #ffe17a);
        border-radius: 99px;
        /* Creep from 0→5% during bundle download; JS overrides via inline style */
        animation: splash-creep 3s ease-out forwards;
        transition: width 0.25s ease-out;
      }

      @keyframes splash-creep {
        from { width: 0%; }
        to   { width: 5%; }
      }

      #splash-label {
        font-family: 'Segoe UI', sans-serif;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        margin: 0;
      }
    </style>
  </head>
  <body style="margin:0;background:#071126;">
    <!-- Native splash — visible immediately, before any JS loads -->
    <div id="splash">
      <div id="splash-inner">
        <div id="splash-logo-wrap">
          <div id="splash-logo" aria-label="One Piece TCG"></div>
          <p id="splash-sub">Online</p>
        </div>

        <div id="splash-progress-wrap">
          <div id="splash-bar-track">
            <div id="splash-bar"></div>
          </div>
          <p id="splash-label">Loading&hellip;</p>
        </div>
      </div>
    </div>

    <script>
      // Expose a global so JS (useAppInit) can drive the progress bar
      // even before React fully takes over. Inline style beats the CSS
      // animation, so the first call to __splashProgress() cancels the creep.
      window.__splashProgress = function(pct) {
        var bar   = document.getElementById('splash-bar');
        var label = document.getElementById('splash-label');
        if (bar)   bar.style.width = pct + '%';
        if (label) label.textContent = Math.round(pct) + '%';
      };
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
